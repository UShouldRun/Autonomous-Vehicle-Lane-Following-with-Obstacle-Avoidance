env:
  camera_resolution: [84, 84]

action_space:
  type: continuous

observation:
  grayscale: false
  max_speed: 15.0
  normalize_lidar: true
  lidar_max_range: 30.0

reward:
  type: dense
  w_progress: 100.0       # rewards signed forward progress (m); ~1.1 at full speed, now competitive with alignment penalty
  w_alignment: 0.70      # quadratic penalty on lateral offset, decoupled from speed
  w_alignment_bonus: 0.60  # positive reward for being centred on the line: bonus = w * (1 - |theta_norm|), max at theta_norm=0
  w_speed: 10.0          # direct bonus on forward speed (m/s) — encourages going fast once aligned
  w_line_lost: 1.0      # flat per-step penalty while the yellow line is not visible
  w_lap: 50.0           # one-off bonus when a full lap is completed
  w_collision: 5.0    # terminal collision penalty
  collision_threshold: 0.35

agent:
  n_steps: 1024
  learning_rate: 0.0007234279845665417
  batch_size: 64
  gamma: 0.9887130386924259
  gae_lambda: 0.9286203127474678
  clip_range: 0.13301557735830305
  ent_coef: 3.3645796728451706e-07
  n_epochs: 6
  buffer_size: 10000

training:
  total_timesteps: 500000
  checkpoint_every_n_steps: 10000

episode:
  max_steps: 100000
  stall_speed_threshold: 1.0   # m/s — prevents the agent from creeping to avoid risk
  stall_steps: 1500

monitoring:
  near_miss_threshold: 1.0
  lap_departure_distance: 20.0
  lap_return_distance: 5.0
  summary_every_n_episodes: 10
  csv_log: true

obstacles:
  enabled: false
  spawn_interval_min_m: 30.0
  spawn_interval_max_m: 70.0
  distance_ahead_min: 15.0
  distance_ahead_max: 35.0
  min_spawn_distance: 10.0
  lateral_offset_max: 4.0
  max_active: 3
  recycle_behind_distance: 3.0
  barrel_radius: 0.4
  barrel_height: 1.0
  barrel_z: 0.5
  barrel_color: [1.0, 0.4, 0.0]
