# Experiment 2 — Reward Function Impact
# Variant: DQN  (discrete)  +  sparse reward

env:
  camera_resolution: [32, 32]

action_space:
  type: discrete

observation:
  grayscale: false
  max_speed: 15.0
  normalize_lidar: true
  lidar_max_range: 10.0

reward:
  type: sparse
  w1: 1.0        # unused by sparse
  w2: 0.5
  w3: 1.0
  w4: 10.0
  d_safe: 1.0
  collision_threshold: 0.35

agent:
  learning_rate: 3.0e-4
  batch_size: 64
  gamma: 0.99
  buffer_size: 10000

training:
  total_timesteps: 200000
  checkpoint_every_n_steps: 50000

episode:
  max_steps: 100000
  stall_speed_threshold: 0
  stall_steps: 1500

monitoring:
  near_miss_threshold: 1.0
  lap_departure_distance: 20.0
  lap_return_distance: 5.0
  summary_every_n_episodes: 10
  csv_log: true

obstacles:
  enabled: false
